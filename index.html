<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工程量計算機 - 專業五合一版</title>
    <style>
        :root { 
            --primary: #5a6b7a; --bg: #cdc7be; --success: #6b7e7c; --warning: #8e735b;
            --card-bg: #ffffff; --text: #2c2c2c; --border: #a1a1a1;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); padding-bottom: 60px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.12); margin-bottom: 20px; }
        h1 { font-size: 1.4rem; color: #44505c; text-align: center; margin-bottom: 20px; font-weight: 800; }
        h2 { color: var(--primary); font-size: 1.1rem; margin-top: 0; border-left: 6px solid var(--primary); padding-left: 12px; margin-bottom: 15px; }
        .card.tp h2 { color: var(--success); border-left-color: var(--success); }
        .hint { font-size: 0.75rem; color: #666; margin-bottom: 8px; font-style: italic; }
        .row { display: flex; gap: 8px; margin-bottom: 10px; }
        input, select { flex: 1; padding: 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; background: #ffffff; color: var(--text); }
        button { width: 100%; border: none; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        button:active { transform: scale(0.97); opacity: 0.9; }
        .add-btn { background: var(--primary); margin-bottom: 8px; }
        .tp-btn { background: var(--success); margin-bottom: 8px; }
        .record-list { width: 100%; border-collapse: collapse; margin-top: 12px; }
        .record-list tr { border-top: 1px solid #eee; }
        .record-list td { padding: 12px 5px; font-size: 0.85rem; }
        .record-val { font-weight: bold; text-align: right; }
        .del-btn { color: #b25d5d; background: none; width: auto; font-size: 13px; font-weight: bold; padding: 5px; box-shadow: none; }
        .total-box { background: #f4f4f4; padding: 14px; border-radius: 8px; font-weight: 900; margin-top: 15px; text-align: right; border: 1px solid #dcdcdc; font-size: 1.05rem; }
        .btn-group { text-align: center; margin: 40px 0; display: flex; flex-direction: column; gap: 10px; }
        .clear-btn { background: var(--warning); width: auto; align-self: center; padding: 12px 40px; }
        .export-btn { background: #5a6b7a; width: auto; align-self: center; padding: 12px 40px; }
    </style>
</head>
<body>

    <h1>🏗️ 工程計算小幫手</h1>

    <div class="card">
        <h2>高程放樣 (Stakeout)</h2>
        <div class="hint">公式：(BM + BS) - 設計高 = 讀數</div>
        <div class="row">
            <input type="number" id="stBM" placeholder="基準 BM" step="any">
            <input type="number" id="stBS" placeholder="後視 BS" step="any">
        </div>
        <div class="row">
            <input type="number" id="stDS" placeholder="設計高程" step="any">
        </div>
        <button class="add-btn" onclick="runCalc('leveling')">計算放樣讀數</button>
        <div id="list-leveling"></div>
        <div class="total-box" id="tot-leveling">應讀數：0.000 m</div>
    </div>

    <div class="card tp">
        <h2>控制點轉點 (TP)</h2>
        <div class="hint">公式：(BM + BS) - FS = 新點高程</div>
        <div class="row">
            <input type="number" id="tpBM" placeholder="舊基準 BM" step="any">
            <input type="number" id="tpBS" placeholder="後視 BS" step="any">
        </div>
        <div class="row">
            <input type="number" id="tpFS" placeholder="前視 FS" step="any">
        </div>
        <button class="tp-btn" onclick="runCalc('transfer')">計算新點高程</button>
        <div id="list-transfer"></div>
        <div class="total-box" id="tot-transfer">新點高程：0.000 m</div>
    </div>

    <div class="card">
        <h2>水泥澆置 (m³)</h2>
        <div class="row">
            <input type="number" id="cL" placeholder="長 (m)" step="any">
            <input type="number" id="cW" placeholder="寬 (m)" step="any">
            <input type="number" id="cH" placeholder="厚/高 (m)" step="any">
        </div>
        <button class="add-btn" onclick="runCalc('concrete')">新增水泥紀錄</button>
        <div id="list-concrete"></div>
        <div class="total-box" id="tot-concrete">水泥總計：0.00 m³</div>
    </div>

    <div class="card">
        <h2>鋼筋重量 (kg)</h2>
        <div class="row">
            <select id="rT">
                <option value="0.560">D10 #3 (0.560)</option>
                <option value="0.994">D13 #4 (0.994)</option>
                <option value="1.550">D16 #5 (1.550)</option>
                <option value="2.250">D19 #6 (2.250)</option>
                <option value="3.040">D22 #7 (3.040)</option>
                <option value="3.980">D25 #8 (3.980)</option>
            </select>
            <input type="number" id="rL" placeholder="單根長度 (m)" step="any">
            <input type="number" id="rN" placeholder="總根數" step="any">
        </div>
        <button class="add-btn" onclick="runCalc('rebar')">新增鋼筋紀錄</button>
        <div id="list-rebar"></div>
        <div class="total-box" id="tot-rebar">鋼筋總和：0.00 kg</div>
    </div>

    <div class="card">
        <h2>模板面積 (m²)</h2>
        <div class="row">
            <input type="number" id="fL" placeholder="長度 (m)" step="any">
            <input type="number" id="fW" placeholder="寬度 (m)" step="any">
            <select id="fS">
                <option value="1">單面</option>
                <option value="2">雙面</option>
            </select>
        </div>
        <button class="add-btn" onclick="runCalc('form')">新增模板紀錄</button>
        <div id="list-form"></div>
        <div class="total-box" id="tot-form">模板總面積：0.00 m²</div>
    </div>

    <div class="btn-group">
        <button class="export-btn" onclick="copyToClipboard()">📋 複製統計結果 (LINE)</button>
        <button class="clear-btn" onclick="clearAll()">🧨 清除所有數據</button>
    </div>

    <script>
        // 資料初始化
        let db = { concrete: [], rebar: [], form: [], leveling: [], transfer: [] };

        function initApp() {
            try {
                const saved = localStorage.getItem('engData');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    db.concrete = Array.isArray(parsed.concrete) ? parsed.concrete : [];
                    db.rebar = Array.isArray(parsed.rebar) ? parsed.rebar : [];
                    db.form = Array.isArray(parsed.form) ? parsed.form : [];
                    db.leveling = Array.isArray(parsed.leveling) ? parsed.leveling : [];
                    db.transfer = Array.isArray(parsed.transfer) ? parsed.transfer : [];
                }
            } catch (e) { db = { concrete: [], rebar: [], form: [], leveling: [], transfer: [] }; }
            updateUI();
        }

        function runCalc(type) {
            let val = 0; let txt = "";
            try {
                if (type === 'leveling') {
                    let bm = parseFloat(document.getElementById('stBM').value) || 0;
                    let bs = parseFloat(document.getElementById('stBS').value) || 0;
                    let ds = parseFloat(document.getElementById('stDS').value) || 0;
                    val = (bm + bs) - ds;
                    txt = `放樣|BM:${bm}+BS:${bs}-設:${ds}`;
                    document.getElementById('stDS').value = '';
                } else if (type === 'transfer') {
                    let bm = parseFloat(document.getElementById('tpBM').value) || 0;
                    let bs = parseFloat(document.getElementById('tpBS').value) || 0;
                    let fs = parseFloat(document.getElementById('tpFS').value) || 0;
                    val = (bm + bs) - fs;
                    txt = `轉點|BM:${bm}+BS:${bs}-FS:${fs}`;
                    if(confirm(`新點高程 ${val.toFixed(3)}，是否更新為基準？`)) {
                        document.getElementById('tpBM').value = val.toFixed(3);
                        document.getElementById('stBM').value = val.toFixed(3);
                        document.getElementById('tpBS').value = ''; document.getElementById('tpFS').value = '';
                    }
                } else if (type === 'concrete') {
                    let l = parseFloat(document.getElementById('cL').value), w = parseFloat(document.getElementById('cW').value), h = parseFloat(document.getElementById('cH').value);
                    if(l && w && h) { val = l * w * h; txt = `${l}×${w}×${h}`; }
                    document.getElementById('cL').value=''; document.getElementById('cW').value=''; document.getElementById('cH').value='';
                } else if (type === 'rebar') {
                    let u = parseFloat(document.getElementById('rT').value), l = parseFloat(document.getElementById('rL').value), n = parseFloat(document.getElementById('rN').value);
                    let name = document.getElementById('rT').options[document.getElementById('rT').selectedIndex].text.split(' (')[0];
                    if(l && n) { val = u * l * n; txt = `${name}|${l}m×${n}支`; }
                    document.getElementById('rL').value=''; document.getElementById('rN').value='';
                } else if (type === 'form') {
                    let l = parseFloat(document.getElementById('fL').value), w = parseFloat(document.getElementById('fW').value), s = parseInt(document.getElementById('fS').value);
                    if(l && w) { val = l * w * s; txt = `${l}×${w}(${s==1?'單':'雙'})`; }
                    document.getElementById('fL').value=''; document.getElementById('fW').value='';
                }
                if (txt !== "") { db[type].push({ v: val, t: txt }); sync(); }
            } catch (e) { alert("計算出錯"); }
        }

        function sync() { localStorage.setItem('engData', JSON.stringify(db)); updateUI(); }
        function removeAt(type, i) { db[type].splice(i, 1); sync(); }
        function clearAll() { if(confirm('確定要清空所有數據嗎？')) { db = { concrete: [], rebar: [], form: [], leveling: [], transfer: [] }; sync(); } }

        function updateUI() {
            ['concrete', 'rebar', 'form', 'leveling', 'transfer'].forEach(type => {
                const listEl = document.getElementById(`list-${type}`);
                const totEl = document.getElementById(`tot-${type}`);
                if (!listEl || !totEl) return;

                let html = '<table class="record-list">'; let sum = 0;
                db[type].forEach((item, i) => {
                    sum += item.v;
                    let dVal = (type === 'leveling' || type === 'transfer') ? item.v.toFixed(3) : item.v.toFixed(2);
                    html += `<tr><td>${item.t}</td><td class="record-val">${dVal}</td>
                             <td style="text-align:right"><button class="del-btn" onclick="removeAt('${type}', ${i})">刪除</button></td></tr>`;
                });
                listEl.innerHTML = html + '</table>';

                if(type === 'leveling') totEl.innerText = `應讀數：${(db.leveling.length > 0 ? db.leveling[db.leveling.length-1].v : 0).toFixed(3)} m`;
                else if(type === 'transfer') totEl.innerText = `新點高程：${(db.transfer.length > 0 ? db.transfer[db.transfer.length-1].v : 0).toFixed(3)} m`;
                else {
                    let unit = type === 'concrete' ? ' m³' : (type === 'rebar' ? ' kg' : ' m²');
                    let lbl = { concrete: '水泥總計：', rebar: '鋼筋總計：', form: '模板總面積：' };
                    totEl.innerText = lbl[type] + sum.toFixed(2) + unit;
                }
            });
        }

        function copyToClipboard() {
            let res = "🏗️ 工程統計結果\n";
            ['leveling', 'transfer', 'concrete', 'rebar', 'form'].forEach(type => {
                let s = 0; db[type].forEach(it => s += it.v);
                if(type === 'leveling' && db.leveling.length > 0) res += `📍 放樣應讀: ${db.leveling[db.leveling.length-1].v.toFixed(3)} m\n`;
                if(type === 'transfer' && db.transfer.length > 0) res += `📍 轉點高程: ${db.transfer[db.transfer.length-1].v.toFixed(3)} m\n`;
                if(type === 'concrete') res += `🔹 水泥: ${s.toFixed(2)} m³\n`;
                if(type === 'rebar') res += `🔹 鋼筋: ${s.toFixed(2)} kg\n`;
                if(type === 'form') res += `🔹 模板: ${s.toFixed(2)} m²\n`;
            });
            const el = document.createElement('textarea'); el.value = res; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            alert("統計結果已複製！可貼到 LINE 分享。");
        }

        initApp();
    </script>
</body>
</html>
