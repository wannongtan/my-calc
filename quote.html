<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>專業工程報價系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* 這裡是莫蘭迪色系的樣式控制 */
        :root { --primary: #5a6b7a; --bg: #cdc7be; }
        body { font-family: "PingFang TC", sans-serif; background: var(--bg); padding: 20px; }
        .editor-box { background: white; padding: 20px; border-radius: 12px; max-width: 800px; margin: 0 auto 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 6px; }
        button { padding: 12px; cursor: pointer; border-radius: 8px; font-weight: bold; border: none; }
        .pdf-btn { background: var(--primary); color: white; width: 100%; margin-top: 15px; font-size: 1.1rem; }
    </style>
</head>
