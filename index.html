<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工程量計算機 - 列表總計版</title>
    <style>
        :root { 
            --primary: #5a6b7a;    /* 深石藍 */
            --bg: #cdc7be;         /* 莫蘭迪水泥灰 */
            --success: #6b7e7c;    /* 深煙燻綠 */
            --warning: #8e735b;    /* 深陶褐色 */
            --card-bg: #ffffff;
            --text: #2c2c2c;
            --border: #a1a1a1;
        }
        body { 
            font-family: -apple-system, "Helvetica Neue", sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 15px; 
            color: var(--text);
            padding-bottom: 60px;
        }
        .card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 18px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.12); 
            margin-bottom: 20px; 
        }
        h1 { font-size: 1.4rem; color: #44505c; text-align: center; margin-bottom: 20px; font-weight: 800; }
        h2 { 
            color: var(--primary); 
            font-size: 1.1rem; 
            margin-top: 0; 
            border-left: 6px solid var(--primary); 
            padding-left: 12px; 
            margin-bottom: 15px;
        }
        .hint { font-size: 0.75rem; color: #666; margin-bottom: 8px; font-style: italic; }
        .row { display: flex; gap: 8px; margin-bottom: 10px; }
        input, select { 
            flex: 1; 
            padding: 14px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            font-size: 16px; 
            width: 100%; 
            box-sizing: border-box; 
            outline: none; 
            background: #ffffff;
        }
        button { 
            width: 100%; 
            border: none; 
            padding: 15px; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            color: white; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        button:active { transform: scale(0.97); opacity: 0.9; }
        .add-btn { background: var(--primary); margin-bottom: 8px; }
        
        /* 列表樣式 */
        .record-list { width: 100%; border-collapse: collapse; margin-top: 12px; }
        .record-list tr { border-top: 1px solid #eee; }
        .record-list td { padding: 12px 5px; font-size: 0.9rem; vertical-align: middle; }
        .record-info { color: #555; }
        .record-val { font-weight: bold; text-align: right; color: #333; }
        .del-btn { color: #b25d5d; border: none; background: none; font-size: 13px; font-weight: bold; padding: 5px; width: auto; box-shadow: none; }

        .total-box { 
            background: #f4f4f4; 
            padding: 14px; 
            border-radius: 8px; 
            color: #2c2c2c; 
            font-weight: 900; 
            margin-top: 15px; 
            text-align: right; 
            border: 1px solid #dcdcdc;
            font-size: 1.05rem;
        }
        .btn-group { text-align: center; margin: 40px 0; display: flex; flex-direction: column; gap: 10px; }
        .clear-btn { background: var(--warning); width: auto; align-self: center; padding: 12px 40px; }
        .export-btn { background: #5a6b7a; width: auto; align-self: center; padding: 12px 40px; }
    </style>
</head>
<body>

    <h1>🏗️ 工程計算小幫手</h1>
